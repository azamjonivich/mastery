<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mastery Hub | Premium AI Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .gradient-dark { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .hidden { display: none; }
        .card-anim { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .card-anim:hover { transform: translateY(-10px) scale(1.02); shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="authPage" class="fixed inset-0 z-[100] gradient-dark flex items-center justify-center px-6">
        <div class="bg-white w-full max-w-md p-10 rounded-[2.5rem] shadow-2xl">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black text-indigo-700 tracking-tighter">MASTERY HUB</h1>
                <p class="text-slate-500 mt-2">Kelajak ta'limiga xush kelibsiz</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="userNameInput" placeholder="Ismingizni yozing" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-indigo-500">
                <input type="email" placeholder="Email (ixtiyoriy)" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-indigo-500">
                <button onclick="login()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition">Kirish</button>
            </div>
            <p class="text-center mt-6 text-xs text-slate-400 font-medium uppercase tracking-widest">Powered by Mastery AI</p>
        </div>
    </div>

    <div id="mainUI" class="hidden">
        <nav class="sticky top-0 z-50 glass border-b border-slate-100 px-8 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-8">
                <h1 class="text-2xl font-black text-indigo-700 tracking-tighter cursor-pointer" onclick="showSection('homeSection')">MASTERY HUB</h1>
                <div class="hidden md:flex space-x-6 font-semibold text-slate-500 text-sm">
                    <button onclick="showSection('homeSection')" class="hover:text-indigo-600">Asosiy</button>
                    <button onclick="showSection('marketSection')" class="hover:text-indigo-600">Marketplace</button>
                    <button onclick="showSection('mentorSection')" class="hover:text-indigo-600">Mentorlik</button>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <div class="bg-amber-100 px-4 py-1.5 rounded-full border border-amber-200 flex items-center">
                    <span class="mr-2">🪙</span><span id="coins" class="font-bold text-amber-700">1350</span>
                </div>
                <div class="w-10 h-10 rounded-full bg-indigo-600 flex items-center justify-center text-white font-bold" id="userInitial">A</div>
            </div>
        </nav>

        <div id="homeSection" class="max-w-7xl mx-auto py-12 px-6">
            <div class="flex flex-col md:flex-row justify-between items-end mb-10">
                <div>
                    <h2 class="text-4xl font-extrabold tracking-tight mb-2">Salom, <span id="helloName" class="text-indigo-600">O'quvchi</span>! 👋</h2>
                    <p class="text-slate-500">Bugun bilimingizni qaysi yo'nalishda oshiramiz?</p>
                </div>
                <button onclick="showSection('battleSection')" class="mt-4 md:mt-0 bg-red-500 text-white px-8 py-3 rounded-2xl font-black shadow-xl shadow-red-100 hover:bg-red-600 animate-bounce">BATTLE MODE ⚔️</button>
            </div>

            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                <div onclick="openModule('listening')" class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 card-anim cursor-pointer">
                    <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 text-2xl mb-6"><i class="fas fa-headphones"></i></div>
                    <h3 class="text-2xl font-bold mb-2 text-slate-800">Listening Mastery</h3>
                    <p class="text-slate-500 text-sm mb-6">Dictation, Shadowing va AI Pronunciation tahlili.</p>
                    <div class="flex -space-x-2">
                        <div class="w-8 h-8 rounded-full border-2 border-white bg-slate-200 flex items-center justify-center text-[10px] font-bold">A2</div>
                        <div class="w-8 h-8 rounded-full border-2 border-white bg-slate-200 flex items-center justify-center text-[10px] font-bold">B2</div>
                        <div class="w-8 h-8 rounded-full border-2 border-white bg-slate-200 flex items-center justify-center text-[10px] font-bold">C1
