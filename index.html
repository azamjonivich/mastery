<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>AI Learning Platform</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
    }

    header {
      background: #1e293b;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      border: none;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
    }

    .battle {
      grid-column: span 2;
      text-align: center;
      background: #0ea5e9;
      color: black;
    }
  </style>
</head>

<body>

<header>
  🚀 AI Learning Platform (Demo)
</header>

<div class="container">

  <!-- Listening -->
  <div class="card">
    <h2>🎧 Listening Mastery</h2>
    <p>Audio, dictation va shadowing practice</p>
    <button onclick="alert('Audio loading... (demo)')">Start Listening</button>
  </div>

  <!-- Reading -->
  <div class="card">
    <h2>📖 Reading & Analysis</h2>
    <p>Articles + flashcards + AI summary</p>
    <button onclick="alert('Article opened (demo)')">Start Reading</button>
  </div>

  <!-- Gamification -->
  <div class="card">
    <h2>🚀 Coins & Rewards</h2>
    <p>0 Coins</p>
    <button onclick="earnCoins()">Earn Coins</button>
  </div>

  <!-- Battle Mode -->
  <div class="card battle">
    <h2>⚔️ Battle Mode (Duel)</h2>
    <p>Real-time competition (demo)</p>
    <button onclick="startBattle()">Start Battle</button>
  </div>

</div>

<script>
  let coins = 0;

  function earnCoins() {
    coins += 10;
    alert("Siz 10 coin oldingiz! Total: " + coins);
  }

  function startBattle() {
    let result = Math.random() > 0.5 ? "Siz yutdingiz 🎉" : "Siz yutqazdingiz 😢";
    alert(result);
  }
</script>

</body>
</html>
